<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Michael Yu's HomePage</title>
    <link rel="shortcut icon" type="images/x-icon" href="public/favicon.ico" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <div class="page-container">
      <!-- 浮动背景元素 -->
      <div class="background-decoration">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
      </div>

      <!-- 主提案内容 -->
      <div class="content-wrapper">
        <div class="hero-content">
          <h1 class="name-text">Michael Yu</h1>
          <p class="subtitle">Java Full Stack Developer</p>

          <!-- 流动下划线 -->
          <div class="animated-line"></div>

          <!-- 技术栈 -->
          <div class="tech-stack">
            <div class="tech-category">
              <h3 class="tech-title">Frontend</h3>
              <div class="tech-tags">
                <span class="tech-tag">HTML/CSS</span>
                <span class="tech-tag">JavaScript</span>
                <span class="tech-tag">Vue.js</span>
                <span class="tech-tag">React</span>
              </div>
            </div>
            <div class="tech-category">
              <h3 class="tech-title">Backend</h3>
              <div class="tech-tags">
                <span class="tech-tag">Java</span>
                <span class="tech-tag">Spring Boot</span>
                <span class="tech-tag">MySQL</span>
                <span class="tech-tag">Redis</span>
              </div>
            </div>
            <div class="tech-category">
              <h3 class="tech-title">Tools</h3>
              <div class="tech-tags">
                <span class="tech-tag">Git</span>
                <span class="tech-tag">Docker</span>
                <span class="tech-tag">Webpack</span>
                <span class="tech-tag">Linux</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="js/index.js"></script>
  </body>
</html>
