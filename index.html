<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>个股深度研究 · 报告导航</title>
<style>
:root{--bg:#0c0f15;--card:#1a1c24;--border:#2a2d3a;--gold:#d4a853;--gold-light:#e3c26d;--red:#f55656;--text:#e8e9ec;--text-sec:#b0b3be;--text-muted:#7a7d8a;--radius:10px;--transition:0.2s ease}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;font-size:14px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
.container{max-width:700px;width:100%}
h1{font-size:26px;font-weight:800;letter-spacing:1px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
h1 .badge{background:linear-gradient(135deg,#c0392b,#8b0000);color:#fff;font-size:12px;padding:2px 11px;border-radius:10px;font-weight:600}
.subtitle{color:var(--text-muted);font-size:13px;margin:8px 0 32px;border-left:3px solid var(--gold);padding-left:14px}
.stock-list{display:flex;flex-direction:column;gap:12px}
.stock-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;transition:var(--transition)}
.stock-card:hover{border-color:var(--gold);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.stock-icon{width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,#2c1a1a,#1c1010);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;color:var(--gold);border:1px solid var(--gold-light);flex-shrink:0}
.stock-name{font-size:17px;font-weight:700}
.stock-code{font-size:12px;color:var(--text-muted);font-family:"JetBrains Mono","Consolas",monospace;margin-top:1px}
.stock-arrow{color:var(--gold-light);font-size:13px;margin-left:auto;opacity:0.6}
.stock-card:hover .stock-arrow{opacity:1}
.empty{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px;border:2px dashed var(--border);border-radius:var(--radius)}
footer{margin-top:48px;font-size:12px;color:var(--text-muted);text-align:center;padding-top:20px;border-top:1px solid var(--border);width:100%}
</style>
</head>
<body>
<div class="container">
